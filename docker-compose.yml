version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: scartrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scartrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scartrack123}
      POSTGRES_DB: ${POSTGRES_DB:-scartrackdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scartrack} -d ${POSTGRES_DB:-scartrackdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scartrack_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scartrack}:${POSTGRES_PASSWORD:-scartrack123}@db:5432/${POSTGRES_DB:-scartrackdb}?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-supersecretkey_change_in_production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-YOUR_MAPBOX_TOKEN_HERE}
      SOCKET_PORT: ${SOCKET_PORT:-3001}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env:ro

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scartrack_migrate
    command: sh -c "npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scartrack}:${POSTGRES_PASSWORD:-scartrack123}@db:5432/${POSTGRES_DB:-scartrackdb}?schema=public
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  pgdata:
    driver: local

networks:
  default:
    name: scartrack_network
